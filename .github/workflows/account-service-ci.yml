name: account-service CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/account-service/**"
      - ".github/workflows/account-service-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/account-service/**"
      - ".github/workflows/account-service-ci.yml"

permissions:
  contents: read
  security-events: write
  packages: write
  id-token: write

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/account-service
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build & run tests
        run: ./mvnw -B verify

  sca:
    name: Trivy SCA (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/account-service
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.5
        with:
          sarif_file: trivy-results.sarif
          category: trivy-account-service

  image:
    name: Build & scan container image
    runs-on: ubuntu-latest
    needs: build-test
    defaults:
      run:
        working-directory: apps/account-service
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: svetlioo/account-service
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Package JAR
        run: ./mvnw -B -q -DskipTests package

      - name: Extract version from pom.xml
        id: ver
        run: |
          version=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout | sed 's/-SNAPSHOT//')
          short_sha=${GITHUB_SHA::7}
          echo "tag=${version}-r${{ github.run_number }}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.tag }}
            type=sha,format=long
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v7.1.0
        with:
          context: apps/account-service
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.5
        with:
          sarif_file: trivy-image.sarif
          category: trivy-account-service-image

      - name: Push image (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7.1.0
        with:
          context: apps/account-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
