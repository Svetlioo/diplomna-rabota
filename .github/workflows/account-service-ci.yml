name: account-service CI

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/account-service/**"
      - ".github/workflows/account-service-ci.yml"
  push:
    branches: [main]
    paths:
      - "apps/account-service/**"
      - ".github/workflows/account-service-ci.yml"

permissions:
  contents: read
  security-events: write

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/account-service
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build & run tests
        run: ./mvnw -B verify

  sca:
    name: Trivy SCA (dependencies)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: apps/account-service
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-account-service

