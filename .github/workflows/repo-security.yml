name: repo security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.163.0
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/java \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/cwe-top-25 \
            --sarif --output=semgrep.sarif \
            --metrics=off \
            --exit-zero

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.5
        with:
          sarif_file: semgrep.sarif
          category: semgrep
