name: bank-service CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      bank: ${{ steps.filter.outputs.bank }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v4.0.1
        id: filter
        with:
          filters: |
            bank:
              - 'apps/bank-service/**'
              - '.github/workflows/bank-service-ci.yml'

  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.bank == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    defaults:
      run:
        working-directory: apps/bank-service
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build & run tests
        run: ./mvnw -B verify

  image:
    name: Build & scan container image
    runs-on: ubuntu-latest
    needs: [changes, build-test]
    if: needs.changes.outputs.bank == 'true' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    defaults:
      run:
        working-directory: apps/bank-service
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: svetlioo/bank-service
    outputs:
      image: ghcr.io/svetlioo/bank-service
      digest: ${{ steps.push.outputs.digest }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Package JAR
        run: ./mvnw -B -q -DskipTests package

      - name: Extract version from pom.xml
        id: ver
        run: |
          version=$(./mvnw -q help:evaluate -Dexpression=project.version -DforceStdout | sed 's/-SNAPSHOT//')
          short_sha=${GITHUB_SHA::7}
          echo "tag=${version}-build.${{ github.run_number }}-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.tag }}
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build image (load locally for scanning)
        uses: docker/build-push-action@v7.1.0
        with:
          context: apps/bank-service
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.tag }}
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4.35.5
        with:
          sarif_file: trivy-image.sarif
          category: trivy-bank-service-image

      - name: Push image (main only)
        id: push
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7.1.0
        with:
          context: apps/bank-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

      - name: Install Cosign
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v4.1.2
        with:
          cosign-release: v3.0.6

      - name: Sign image with Cosign (keyless)
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: cosign sign --yes --new-bundle-format=false --use-signing-config=false "$IMAGE"

      - name: Generate CycloneDX SBOM with Syft
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: cyclonedx-json
          output-file: ${{ github.workspace }}/sbom.cdx.json

      - name: Upload SBOM artifact
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: sbom-bank-service
          path: ${{ github.workspace }}/sbom.cdx.json

      - name: Attest SBOM with Cosign
        if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ${{ github.workspace }}
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: cosign attest --yes --new-bundle-format=false --use-signing-config=false --predicate sbom.cdx.json --type cyclonedx "$IMAGE"

  deploy-dev:
    name: Deploy to dev (gitops)
    runs-on: ubuntu-latest
    needs: [changes, image]
    if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-dev-bank
      cancel-in-progress: false
    env:
      GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      TAG: ${{ needs.image.outputs.tag }}
      DIGEST: ${{ needs.image.outputs.digest }}
      BRANCH: deploy/bank-dev-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v6.0.2
        with:
          repository: Svetlioo/diplomna-rabota-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Create deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

      - name: Update dev image tag + digest
        run: |
          yq -i '.image.tag = strenv(TAG) | .image.digest = strenv(DIGEST)' environments/dev/values-bank.yaml
          git commit -am "deploy(dev): bank-service ${TAG}"

      - name: Push deploy branch
        run: git push -u origin "$BRANCH"

      - name: Open pull request
        run: |
          gh pr create --base main --head "$BRANCH" \
            --title "deploy(dev): bank-service ${TAG}" \
            --body "Automated dev deploy from bank-service CI run ${{ github.run_id }}."

      - name: Merge pull request
        run: gh pr merge "$BRANCH" --squash --delete-branch --admin

  provenance:
    name: SLSA provenance
    needs: [changes, image]
    if: needs.changes.outputs.bank == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0
    with:
      image: ${{ needs.image.outputs.image }}
      digest: ${{ needs.image.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
