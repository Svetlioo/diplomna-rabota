spring:
  application:
    name: account-service
  # Local-dev convenience: load env vars from the monorepo root .env file
  # when running from apps/account-service/. The `optional:` prefix means
  # this is silently skipped if the file is absent — which is the case in
  # CI and production, where DB_URL/USERNAME/PASSWORD are injected by the
  # runtime (GitHub Actions secrets, Kubernetes secrets).
  config:
    import: "optional:file:../../.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    # Do not modify schema; Flyway owns it. Validate ensures entities match
    # the migrated schema at startup, failing fast on drift.
    hibernate:
      ddl-auto: validate
    # Disable Open-Session-In-View: keep the Hibernate session bounded to
    # @Transactional methods. Forces explicit DTO mapping (no lazy loads
    # leaking into the JSON layer) and frees DB connections sooner.
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
