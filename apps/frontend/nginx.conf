worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Temp paths under /tmp so the container can run with a read-only root filesystem.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # HTTP-flood throttle. Azure DDoS Basic covers network-layer attacks for free
  # on every public IP; this guards the application layer.
  limit_req_zone $binary_remote_addr zone=app:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=conns:10m;
  limit_req_status 429;
  limit_conn_status 429;

  server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    limit_conn conns 30;

    # Strip /api and forward to bank-service inside the namespace.
    location /api/ {
      limit_req zone=app burst=40 nodelay;
      proxy_pass http://bank-service:8080/;
      proxy_set_header Host bank-service:8080;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: serve index.html for any non-asset path.
    location / {
      limit_req zone=app burst=60 nodelay;
      try_files $uri $uri/ /index.html;
    }
  }
}
