spring:
  application:
    name: bank-service
  # Local-dev convenience: load env vars from the monorepo root .env file.
  # Searched at several levels up so it resolves regardless of the working
  # directory (service dir, apps/, or repo root — terminal or IDE). The
  # `optional:` prefix means each path is silently skipped if absent — which
  # is the case in CI and production, where DB_URL/USERNAME/PASSWORD are
  # injected by the runtime (GitHub Actions secrets, Kubernetes secrets).
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"
      - "optional:file:../../.env[.properties]"
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    # Do not modify schema; Flyway owns it. Validate ensures entities match
    # the migrated schema at startup, failing fast on drift.
    hibernate:
      ddl-auto: validate
    # Disable Open-Session-In-View: keep the Hibernate session bounded to
    # @Transactional methods. Forces explicit DTO mapping (no lazy loads
    # leaking into the JSON layer) and frees DB connections sooner.
    open-in-view: false
  flyway:
    # Defaults to true (Flyway clean is blocked). Local dev sets it to false via
    # .env so the dev-only clean-on-start strategy can wipe the schema.
    clean-disabled: ${FLYWAY_CLEAN_DISABLED:true}

# Local-dev only: wipe + re-migrate on startup (see FlywayDevConfig). Off by
# default; turned on via .env. Never set this in Kubernetes — it drops all data.
app:
  db:
    clean-on-start: ${APP_DB_CLEAN_ON_START:false}

security:
  jwt:
    # HS256 secret used to both sign and validate access tokens.
    secret: ${JWT_SECRET}
    ttl: ${JWT_TTL:PT12H}

server:
  port: ${SERVER_PORT:8080}
