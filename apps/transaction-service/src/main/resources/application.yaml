spring:
  application:
    name: transaction-service
  # Local-dev convenience: load env vars from the monorepo root .env file.
  # Searched at several levels up so it resolves regardless of the working
  # directory (service dir, apps/, or repo root — terminal or IDE). The
  # `optional:` prefix means each path is silently skipped if absent — which
  # is the case in CI and production, where DB_URL/USERNAME/PASSWORD are
  # injected by the runtime (GitHub Actions secrets, Kubernetes secrets).
  config:
    import:
      - "optional:file:.env[.properties]"
      - "optional:file:../.env[.properties]"
      - "optional:file:../../.env[.properties]"
  datasource:
    # Local dev uses TRANSACTION_DB_* (its OWN database on :5433) from the root
    # .env, so it never collides with account-service's shared DB_* values. In
    # Kubernetes those local vars are unset, so it falls back to the generic
    # DB_* injected by the service's own Secret (database-per-service).
    url: ${TRANSACTION_DB_URL:${DB_URL}}
    username: ${TRANSACTION_DB_USERNAME:${DB_USERNAME}}
    password: ${TRANSACTION_DB_PASSWORD:${DB_PASSWORD}}
  jpa:
    # Do not modify schema; Flyway owns it. Validate ensures entities match
    # the migrated schema at startup, failing fast on drift.
    hibernate:
      ddl-auto: validate
    # Keep the Hibernate session bounded to @Transactional methods.
    open-in-view: false

# Base URL of account-service. Locally defaults to the host port account-service
# listens on; in Kubernetes the Helm chart sets it to the in-cluster service DNS.
account-service:
  url: ${ACCOUNT_SERVICE_URL:http://localhost:8080}

server:
  # Local dev runs on :8082 (account-service keeps :8080); in Kubernetes neither
  # local var is set, so the container listens on the standard :8080.
  port: ${TRANSACTION_SERVER_PORT:${SERVER_PORT:8080}}
